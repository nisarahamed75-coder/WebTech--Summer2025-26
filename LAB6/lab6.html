<!DOCTYPE html>
<html>
 
<head>
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="lab6.css">
     
</head>
 
<body>
  
    <div class="container">
 
        <h2>Student Registration Form</h2>
 
        <form id="studentForm">
 
            <label>First Name <span class="required">*</span></label>
            <input type="text" id="fname">
 
            <label>Last Name <span class="required">*</span></label>
            <input type="text" id="lname">
 
            <label>Student ID <span class="required">*</span></label>
            <input type="text" id="sid">
 
            <label>Email <span class="required">*</span></label>
            <input type="text" id="email">
 
            <label>Credit Completed <span class="required">*</span></label>
            <input type="number" id="credit">
 
            <label>Department <span class="required">*</span></label>
            <select id="department">
                <option value="">Select Department</option>
                <option>CSE</option>
                <option>EEE</option>
                <option>BBA</option>
                <option>CS</option>
                <option>Architecture</option>
            </select>
 
            <div class="button">
                <button type="submit">Submit</button>
            </div>
 
        </form>
 
    </div>
 
    <h2 class="listTitle">Registered Student List</h2>
 
    <table id="studentTable">
 
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Student ID</th>
            <th>Email</th>
            <th>Credit</th>
            <th>Department</th>
        </tr>
 
    </table>
    <script src="lab6.js"></script>
  
</body>
 
</html>
